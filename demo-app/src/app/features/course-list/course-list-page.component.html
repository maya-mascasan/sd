<mat-toolbar color="primary" class="page-toolbar">
  <div class="brand">
    <span class="toolbar-title">Admin Hub</span>
  </div>

  <div class="nav-links">
    <button mat-button routerLink="/admin/people" routerLinkActive="active-link">
      <mat-icon>groups</mat-icon> Users
    </button>
    <button mat-button routerLink="/admin/courses" routerLinkActive="active-link">
      <mat-icon>library_books</mat-icon> Courses
    </button>
    <button mat-button routerLink="/admin/departments" routerLinkActive="active-link">
      <mat-icon>account_balance</mat-icon> Departments
    </button>
  </div>

  <span class="toolbar-spacer"></span>

  <button mat-button class="logout-pill" (click)="logout()" aria-label="Sign out">
    <mat-icon aria-hidden="true">logout</mat-icon>
    Logout
  </button>
</mat-toolbar>
<main class="content">
  <header class="page-header">
    <div>
      <h1 class="page-title">Manage Courses</h1>
    </div>
    <button mat-flat-button color="accent" (click)="openCreateDialog()" [disabled]="isLoading()">
      <mat-icon>add</mat-icon> New Course
    </button>
  </header>

  <section class="filter-bar">
    <mat-form-field appearance="outline">
      <mat-label>Search by Title</mat-label>
      <input matInput [ngModel]="store.searchQuery()" (ngModelChange)="store.searchQuery.set($event)" placeholder="e.g. Math">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Min Credits</mat-label>
      <input matInput type="number" [ngModel]="store.minCredits()" (ngModelChange)="store.minCredits.set($event)">
    </mat-form-field>
  </section>

  @if (hasError()) {
    <div class="error-alert">
      <mat-icon>error_outline</mat-icon> {{store.errorMsg()}}
    </div>
  }

  <div class="table-container" [class.is-busy]="isLoading()">
    <table mat-table [dataSource]="filteredCourses()" matSort (matSortChange)="onSortChange($event)">

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th> <td mat-cell *matCellDef="let course">{{ course.title }}</td>
      </ng-container>

      <ng-container matColumnDef="credits">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Credits</th> <td mat-cell *matCellDef="let course">{{ course.credits }}</td>
      </ng-container>

      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Department</th> <td mat-cell *matCellDef="let course">{{ course.department?.name }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let course">
          <button mat-icon-button color="primary" (click)="openEditDialog(course)" [disabled]="isLoading()">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button color="warn" (click)="openDeleteDialog(course)" [disabled]="isLoading()">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</main>
