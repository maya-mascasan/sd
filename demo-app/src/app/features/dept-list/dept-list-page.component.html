<mat-toolbar color="primary" class="page-toolbar">
  <div class="brand">
    <span class="toolbar-title">Admin Hub</span>
  </div>

  <div class="nav-links">
    <button mat-button routerLink="/admin/people" routerLinkActive="active-link">
      <mat-icon>groups</mat-icon> Users
    </button>
    <button mat-button routerLink="/admin/courses" routerLinkActive="active-link">
      <mat-icon>library_books</mat-icon> Courses
    </button>
    <button mat-button routerLink="/admin/departments" routerLinkActive="active-link">
      <mat-icon>account_balance</mat-icon> Departments
    </button>
  </div>

  <span class="toolbar-spacer"></span>

  <button mat-button class="logout-pill" (click)="logout()" aria-label="Sign out">
    <mat-icon aria-hidden="true">logout</mat-icon>
    Logout
  </button>
</mat-toolbar>

<main class="content">
  <header class="page-header">
    <div>
      <h1 class="page-title">Manage Departments</h1>
    </div>
    <button mat-flat-button color="primary" (click)="openCreateDialog()" [disabled]="isLoading()">
      <mat-icon>add</mat-icon> New Department
    </button>
  </header>

  @if (hasError()) {
    <div class="error-alert">
      <mat-icon>error_outline</mat-icon> {{store.errorMsg()}}
    </div>
  }

  <div class="table-container" [class.is-busy]="isLoading()">
    <table mat-table [dataSource]="departments()">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Department Name</th>
        <td mat-cell *matCellDef="let dept">{{ dept.name }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let dept">
          <button mat-icon-button color="primary" (click)="openEditDialog(dept)" [disabled]="isLoading()">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="openDeleteDialog(dept)" [disabled]="isLoading()">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-mdc-row" *matNoDataRow>
        <td [attr.colspan]="displayedColumns.length" class="no-data-cell">
          No departments found. Click "New Department" to add one.
        </td>
      </tr>
    </table>
  </div>
</main>
