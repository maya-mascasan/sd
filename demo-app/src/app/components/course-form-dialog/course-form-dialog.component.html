<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content [formGroup]="form">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Course Title</mat-label>
    <input matInput formControlName="title" placeholder="e.g. Advanced Java">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Credits</mat-label>
    <input matInput type="number" formControlName="credits">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Department</mat-label>
    <mat-select formControlName="departmentId">
      @for (dept of departments(); track dept.id) {
        <mat-option [value]="dept.id">{{ dept.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="form.invalid">
    {{ data.submitLabel }}
  </button>
</mat-dialog-actions>
